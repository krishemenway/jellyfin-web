name: jellyfin-web

on: [push]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 26
    - run: npm ci
      working-directory: ./
    - run: npm run build
      working-directory: ./
    - run: npm run lint
      working-directory: ./
    - uses: actions/upload-artifact@v7
      with:
        name: output
        path: ./dist
